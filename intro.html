<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STARBOY - Intro</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #111;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden; /* ป้องกันการเลื่อนหน้าจอ */
            
            /* เปลี่ยนไอคอนเมาส์ให้เป็นแบบเดียวกันกับหน้าเกม */
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="%23fff" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>') 12 12, crosshair;
        }

        /* วิดีโอพื้นหลังแบบเต็มจอ */
        #intro-video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translateX(-50%) translateY(-50%);
            z-index: -2;
            object-fit: cover;
        }

        /* เลเยอร์สีดำโปร่งแสง คลุมทับวิดีโอเพื่อให้ตัวหนังสือเด่นขึ้น */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.5); /* ปรับความมืดตรงนี้ (0.0 ถึง 1.0) */
            z-index: -1;
        }

        /* คอนเทนเนอร์ตรงกลางหน้าจอ */
        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            color: #e8e4db;
        }

        h1 {
            font-family: 'Impact', 'Arial Black', sans-serif;
            font-size: 80px;
            letter-spacing: 8px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 16px;
            letter-spacing: 3px;
            margin-bottom: 50px;
        }

        /* ปุ่ม PLAY */
        .play-btn {
            background-color: transparent;
            color: #e8e4db;
            border: 2px solid #e8e4db;
            padding: 15px 50px;
            font-size: 20px;
            font-family: inherit;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.4s ease;
            text-decoration: none; /* เผื่อใช้กับแท็ก a */
            text-transform: uppercase;
        }

        .play-btn:hover {
            background-color: #e8e4db;
            color: #111;
            transform: scale(1.05); /* ขยายขนาดปุ่มเล็กน้อยเมื่อชี้ */
        }
        
        button { cursor: inherit; }
          #unmute-btn:hover {
            background-color: #e8e4db;
            color: #111;
        }

         #unmute-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background-color: transparent;
            color: #e8e4db;
            border: 1px solid #e8e4db;
            padding: 8px 15px;
            font-family: inherit;
            font-size: 14px;
            cursor: pointer;
            z-index: 10;
            transition: 0.3s;
        }
    </style>
</head>
<body>
    <button id="unmute-btn" onclick="toggleMute()">🔊 เปิดเสียงวิดีโอ</button>
    <video id="intro-video" autoplay loop muted playsinline>
        <source src="intro-bg.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <div class="content">
        <h1>STARBOY Shooter</h1>
        <div class="subtitle">LET'S GO</div>
        
        <button class="play-btn" onclick="enterGame()">PLAY</button>
    </div>

    <audio id="hover-sfx"><source src="hover.mp3" type="audio/mpeg"></audio>

    <script>
        const playBtn = document.querySelector('.play-btn');
        const hoverSfx = document.getElementById('hover-sfx');

        // เล่นเสียงเมื่อนำเมาส์ไปชี้ปุ่ม
        playBtn.addEventListener('mouseenter', () => {
            hoverSfx.currentTime = 0;
            hoverSfx.play().catch(() => {}); // ป้องกัน error ถ้าเบราว์เซอร์บล็อกเสียง
        });

        // ฟังก์ชันเมื่อกดปุ่ม PLAY
        function enterGame() {
            // พาผู้ใช้ไปยังหน้าเกมตัวหลัก
            window.location.href = "index.html";
        }
        const introVideo = document.getElementById('intro-video');
        const unmuteBtn = document.getElementById('unmute-btn');

        function toggleMute() {
        if (introVideo.muted) {
        introVideo.muted = false; // เปิดเสียง
        unmuteBtn.innerText = "🔇 ปิดเสียงวิดีโอ";
        } else {
        introVideo.muted = true; // ปิดเสียง
        unmuteBtn.innerText = "🔊 เปิดเสียงวิดีโอ";
        }
}
    </script>

</body>
</html>
