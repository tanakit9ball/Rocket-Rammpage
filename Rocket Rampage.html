<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Shooter: Master Edition</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background-color: #111;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            user-select: none;
        }
        
        .screen {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- หน้าเมนูเริ่มเกม และปุ่มระดับความยาก --- */
        #start-menu {
            align-items: center;
            justify-content: center;
            background-color: #1a1a1a;
            padding: 20px;
        }
        h1 {
            font-size: 45px;
            text-shadow: 0 0 10px #0f0;
            margin-bottom: 20px;
            text-align: center;
        }
        .difficulty-btns {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
        }
        .btn {
            background-color: #222;
            color: #0f0;
            border: 2px solid #0f0;
            padding: 15px 30px;
            font-size: 20px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.2s;
        }
        .btn:hover {
            background-color: #0f0;
            color: #000;
            box-shadow: 0 0 15px #0f0;
        }
        .btn.hard:hover {
            background-color: #f00;
            border-color: #f00;
            box-shadow: 0 0 15px #f00;
            color: #fff;
        }

        /* --- ระบบ Score Board --- */
        #scoreboard-container {
            width: 100%;
            max-width: 450px;
            background-color: #222;
            border: 2px solid #0f0;
            border-radius: 8px;
            padding: 20px;
        }
        #scoreboard-container h3 {
            margin-top: 0;
            text-align: center;
            border-bottom: 1px solid #0f0;
            padding-bottom: 10px;
        }
        .score-table { width: 100%; border-collapse: collapse; font-size: 16px; }
        .score-table th, .score-table td { padding: 8px; text-align: center; }
        .score-table th { color: #fff; }
        .score-table tr:nth-child(even) { background-color: #2a2a2a; }

        /* --- หน้าเล่นเกม และ UI --- */
        #game-screen { display: none; }
        
        /* เอฟเฟกต์หน้าจอสั่น */
        .shake {
            animation: shake-animation 0.2s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake-animation {
            0%, 100% { transform: translate3d(0, 0, 0); }
            20%, 60% { transform: translate3d(-10px, 5px, 0); }
            40%, 80% { transform: translate3d(10px, -5px, 0); }
        }

        #ui {
            padding: 10px 20px;
            background-color: #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 18px;
            border-bottom: 2px solid #0f0;
        }
        
        /* สไตล์ของหลอดเลือด HP */
        .hp-container { display: flex; align-items: center; gap: 10px; }
        #hp-bar-bg {
            width: 150px; height: 18px;
            background-color: #444; border: 1px solid #fff;
            border-radius: 3px; overflow: hidden;
        }
        #hp-bar {
            width: 100%; height: 100%;
            background-color: #0f0; transition: width 0.2s, background-color 0.3s;
        }

        /* สไตล์คอมโบ */
        .combo-text { color: #0ff; text-shadow: 0 0 5px #0ff; font-weight: bold; }
        .multiplier { color: #ff0; font-size: 22px; }

        #game-board {
            position: relative;
            flex-grow: 1;
            width: 100vw;
            background-color: #111;
        }
        .enemy {
            position: absolute;
            font-size: 26px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 5px #fff;
            white-space: nowrap;
        }
        
        /* สีของตัวอักษรที่พิมพ์ถูกทีละคำ */
        .typed {
            color: #ff3333; /* เปลี่ยนเป็นสีแดงสว่าง */
            text-shadow: 0 0 8px #ff0000;
            background-color: rgba(255, 0, 0, 0.2); /* มีไฮไลต์พื้นหลังบางๆ */
            border-radius: 2px;
        }
    </style>
</head>
<body>

    <div id="start-menu" class="screen">
        <h1>TYPING SHOOTER</h1>
        
        <!-- ปุ่มเลือกระดับความยาก -->
        <div class="difficulty-btns">
            <button class="btn" onclick="startGame('easy')">EASY</button>
            <button class="btn" onclick="startGame('normal')">NORMAL</button>
            <button class="btn hard" onclick="startGame('hard')">HARD</button>
        </div>

        <div id="scoreboard-container">
            <h3>🏆 LEADERBOARD (TOP 5)</h3>
            <table class="score-table">
                <thead>
                    <tr><th>อันดับ</th><th>Score</th><th>Speed (WPM)</th></tr>
                </thead>
                <tbody id="leaderboard-rows"></tbody>
            </table>
        </div>
    </div>

    <!-- หน้าจอเกม (ซ้อน class shake ได้) -->
    <div id="game-screen" class="screen">
        <div id="ui">
            <div>Score: <span id="score" style="color:#fff; font-weight:bold;">0</span></div>
            <div><span class="combo-text">Combo: <span id="combo">0</span></span> <span class="multiplier">x<span id="multiplier">1</span></span></div>
            <div>Speed: <span id="wpm">0</span> WPM</div>
            
            <div class="hp-container">
                <span>HP:</span>
                <div id="hp-bar-bg"><div id="hp-bar"></div></div>
            </div>

            <div>Target: <span id="target-word" style="color: #fff;">-</span></div>
        </div>
        <div id="game-board"></div>
    </div>

    <script>
        const startMenu = document.getElementById('start-menu');
        const gameScreen = document.getElementById('game-screen');
        const board = document.getElementById('game-board');
        const scoreEl = document.getElementById('score');
        const wpmEl = document.getElementById('wpm');
        const hpBar = document.getElementById('hp-bar');
        const targetWordEl = document.getElementById('target-word');
        const comboEl = document.getElementById('combo');
        const multiplierEl = document.getElementById('multiplier');
        const leaderboardRows = document.getElementById('leaderboard-rows');

        let score = 0;
        let typedChars = 0;
        let startTime = null;
        let enemies = [];
        let currentTarget = null;
        let isGameOver = true;
        let spawnInterval = null;
        let animationFrameId = null;
        let currentWpm = 0;
        
        let hp = 100;
        const maxHp = 100;

        // ตัวแปรระบบ Combo
        let combo = 0;
        let currentMultiplier = 1;

        // การตั้งค่าความยาก (Difficulty Settings)
        let gameSettings = {
            speedMultiplier: 1,
            spawnRate: 2000,
            useMixedCase: false
        };

        const words = ["react", "javascript", "developer", "coding", "shooter", "keyboard", "function", "variable", "browser", "syntax", "database", "algorithm", "cyber", "security", "quantum", "interface"];

        updateLeaderboardUI();

        // --- 1. ระบบเริ่มต้นเกมแบบแบ่งระดับความยาก ---
        function startGame(difficulty) {
            // ตั้งค่ากติกาตามระดับความยาก
            if (difficulty === 'easy') {
                gameSettings = { speedMultiplier: 0.8, spawnRate: 2500, useMixedCase: false };
            } else if (difficulty === 'normal') {
                gameSettings = { speedMultiplier: 1.3, spawnRate: 1800, useMixedCase: true };
            } else if (difficulty === 'hard') {
                gameSettings = { speedMultiplier: 2.0, spawnRate: 1000, useMixedCase: true };
            }

            startMenu.style.display = 'none';
            gameScreen.style.display = 'flex';

            // รีเซ็ตค่าสเตตัสต่างๆ
            score = 0;
            typedChars = 0;
            currentWpm = 0;
            combo = 0;
            currentMultiplier = 1;
            hp = maxHp;
            enemies = [];
            currentTarget = null;
            isGameOver = false;
            startTime = Date.now();

            updateUI();
            updateHpUI();
            targetWordEl.innerText = "-";
            board.innerHTML = "";

            spawnInterval = setInterval(spawnEnemy, gameSettings.spawnRate);
            animationFrameId = requestAnimationFrame(updateGame);
        }

        // --- 2. การสร้างศัตรู (รองรับการตั้งค่าความยาก) ---
        function spawnEnemy() {
            if (isGameOver) return;
            
            let rawWord = words[Math.floor(Math.random() * words.length)];
            let displayWord = rawWord;

            // ถ้าเล่น Normal หรือ Hard ให้สุ่มตัวพิมพ์ใหญ่-เล็ก
            if (gameSettings.useMixedCase) {
                displayWord = rawWord.split('').map(char => {
                    return Math.random() > 0.5 ? char.toUpperCase() : char.toLowerCase();
                }).join('');
            }

            const el = document.createElement('div');
            el.className = 'enemy';
            el.innerText = displayWord;
            el.style.left = Math.random() * (window.innerWidth - 180) + 'px';
            el.style.top = '0px';
            board.appendChild(el);
            
            enemies.push({ text: displayWord, el: el, y: 0, typed: "" });
        }

        // --- 3. อัปเดตเกมและการหลุดของคำศัพท์ (Combo Reset) ---
        function updateGame() {
            if (isGameOver) return;

            for (let i = enemies.length - 1; i >= 0; i--) {
                let enemy = enemies[i];
                enemy.y += 1.0 * gameSettings.speedMultiplier; // ความเร็วอิงตามระดับความยาก
                enemy.el.style.top = enemy.y + 'px';

                if (enemy.y > board.clientHeight - 30) {
                    board.removeChild(enemy.el);
                    enemies.splice(i, 1);

                    if (currentTarget === enemy) {
                        currentTarget = null;
                        targetWordEl.innerText = "-";
                    }

                    // หักเลือดและทำลายคอมโบทิ้ง
                    hp -= 20;
                    if (hp < 0) hp = 0;
                    resetCombo(); 
                    updateHpUI();

                    if (hp <= 0) {
                        gameOver();
                        return;
                    }
                }
            }

            if (!isGameOver) {
                animationFrameId = requestAnimationFrame(updateGame);
            }
        }

        // --- 4. ฟังก์ชันตัวช่วย: รีเซ็ตคอมโบ และ สั่นหน้าจอ ---
        function resetCombo() {
            combo = 0;
            currentMultiplier = 1;
            updateUI();
        }

        function triggerShake() {
            // ลบคลาสเก่าออกก่อน (เผื่อมีการสั่นซ้อนกัน)
            gameScreen.classList.remove('shake');
            // บังคับให้เบราว์เซอร์รีเฟรช DOM เพื่อให้ใส่คลาสใหม่แล้วแอนิเมชันทำงานซ้ำได้
            void gameScreen.offsetWidth; 
            // ใส่คลาสสั่น
            gameScreen.classList.add('shake');
        }

        // --- 5. ระบบตรวจจับการพิมพ์, Combo และ Multiplier ---
        document.addEventListener('keydown', (e) => {
            if (isGameOver) return;
            
            const key = e.key;
            if (key.length !== 1 || !/[a-zA-Z]/.test(key)) return;

            // ค้นหาเป้าหมายหากยังไม่มี
            if (!currentTarget) {
                // หากอยู่ในโหมด Easy ให้ไม่สนใจตัวพิมพ์ใหญ่เล็ก
                if (!gameSettings.useMixedCase) {
                    currentTarget = enemies.find(en => en.text.toLowerCase().startsWith(key.toLowerCase()));
                } else {
                    currentTarget = enemies.find(en => en.text.startsWith(key));
                }
                
                if(currentTarget) targetWordEl.innerText = currentTarget.text;
            }

            if (currentTarget) {
                const nextCharIndex = currentTarget.typed.length;
                const targetChar = currentTarget.text[nextCharIndex];

                // ตรวจสอบความถูกต้อง (โหมด Easy อนุโลมให้พิมพ์เล็กใหญ่สลับกันได้)
                let isCorrect = false;
                if (!gameSettings.useMixedCase) {
                    isCorrect = targetChar.toLowerCase() === key.toLowerCase();
                } else {
                    isCorrect = targetChar === key;
                }
                
                if (isCorrect) {
                    // พิมพ์ถูก
                    currentTarget.typed += targetChar; // ใช้ตัวอักษรจริงจากคำศัพท์เพื่อรักษา Case ไว้ตอนแสดงผล
                    typedChars++;
                    combo++; // เพิ่มคอมโบ

                    // คำนวณตัวคูณ (Multiplier): ทุกๆ 10 คอมโบ คูณเพิ่ม 1
                    currentMultiplier = 1 + Math.floor(combo / 10);

                    // อัปเดตการแสดงผลสีทีละคำ
                    currentTarget.el.innerHTML = `<span class="typed">${currentTarget.typed}</span>${currentTarget.text.substring(currentTarget.typed.length)}`;

                    if (currentTarget.typed === currentTarget.text) {
                        board.removeChild(currentTarget.el);
                        enemies = enemies.filter(en => en !== currentTarget);
                        currentTarget = null;
                        targetWordEl.innerText = "-";
                        
                        // ได้คะแนนคูณตาม Multiplier
                        const baseScore = 10;
                        score += (baseScore * currentMultiplier);
                        
                        hp = Math.min(maxHp, hp + 5);
                        updateHpUI();
                    }
                } else {
                    // พิมพ์ผิด
                    triggerShake();
                    resetCombo();
                }
                updateUI();
            } else {
                // กดปุ่มมั่วในขณะที่ไม่มีเป้าหมายให้ตรงกับตัวแรกเลย = ผิด
                triggerShake();
                resetCombo();
            }

            const minutes = (Date.now() - startTime) / 60000;
            if (minutes > 0) {
                currentWpm = Math.round((typedChars / 5) / minutes);
                updateUI();
            }
        });

        // อัปเดตข้อความบนจอ
        function updateUI() {
            scoreEl.innerText = score;
            wpmEl.innerText = currentWpm;
            comboEl.innerText = combo;
            multiplierEl.innerText = currentMultiplier;
        }

        function updateHpUI() {
            hpBar.style.width = hp + '%';
            if (hp > 50) hpBar.style.backgroundColor = '#0f0';
            else if (hp > 25) hpBar.style.backgroundColor = '#ff0';
            else hpBar.style.backgroundColor = '#f00';
        }

        function gameOver() {
            isGameOver = true;
            clearInterval(spawnInterval);
            cancelAnimationFrame(animationFrameId);
            gameScreen.classList.remove('shake'); // ป้องกันค้าง

            alert(`Game Over!\nคะแนนที่ได้: ${score}\nความเร็วการพิมพ์: ${currentWpm} WPM\nทำคอมโบสูงสุด: ${combo}`);

            saveScore(score, currentWpm);
            updateLeaderboardUI();
            
            gameScreen.style.display = 'none';
            startMenu.style.display = 'flex';
        }

        function saveScore(newScore, newWpm) {
            let scoresData = JSON.parse(localStorage.getItem('typingShooterLeaderboard')) || [];
            scoresData.push({ score: newScore, wpm: newWpm });
            scoresData.sort((a, b) => b.score - a.score);
            scoresData = scoresData.slice(0, 5);
            localStorage.setItem('typingShooterLeaderboard', JSON.stringify(scoresData));
        }

        function updateLeaderboardUI() {
            let scoresData = JSON.parse(localStorage.getItem('typingShooterLeaderboard')) || [];
            leaderboardRows.innerHTML = '';
            if (scoresData.length === 0) {
                leaderboardRows.innerHTML = `<tr><td colspan="3" style="color:#777;">ไม่มีข้อมูล</td></tr>`;
                return;
            }
            scoresData.forEach((data, index) => {
                leaderboardRows.innerHTML += `<tr><td>${index + 1}</td><td style="color:#fff; font-weight:bold;">${data.score}</td><td>${data.wpm}</td></tr>`;
            });
        }
    </script>
</body>
</html>
