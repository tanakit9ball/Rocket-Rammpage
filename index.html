<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Shooter: STARBOY</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; background-color: #e8e4db; color: #111;
            font-family: 'Courier New', Courier, monospace; overflow: hidden; user-select: none;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="%23111" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>') 12 12, crosshair;
        }
        button, input { cursor: inherit; }
        #video-container {
            position: absolute; top: -5%; left: -5%; width: 110%; height: 110%;
            z-index: -1; pointer-events: none; opacity: 0.15; transition: transform 0.1s ease-out;
        }
        #bg-video { width: 100%; height: 100%; object-fit: cover; }
        .screen { width: 100vw; height: 100vh; display: flex; flex-direction: column; position: relative; z-index: 1; }
        #start-menu { align-items: center; justify-content: center; padding: 20px; }
        h1 { font-family: 'Impact', 'Arial Black', sans-serif; font-size: 70px; letter-spacing: 5px; margin-bottom: 5px; text-align: center; font-weight: normal; }
        .subtitle { font-size: 14px; margin-bottom: 40px; letter-spacing: 2px; }
        .setup-container { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-bottom: 30px; width: 100%; max-width: 350px; }
        input[type="text"] { width: 100%; padding: 12px; font-size: 18px; font-family: inherit; background-color: transparent; border: 1px solid #111; color: #111; text-align: center; outline: none; }
        input[type="text"]:focus { background-color: rgba(0,0,0,0.05); }
        .difficulty-btns { display: flex; gap: 10px; width: 100%; }
        .btn { flex: 1; background-color: transparent; color: #111; border: 1px solid #111; padding: 12px 15px; font-size: 16px; font-family: inherit; font-weight: bold; transition: 0.3s; text-transform: uppercase; }
        .btn:hover { background-color: #111; color: #e8e4db; }
        #bgm-btn { position: absolute; top: 20px; right: 20px; padding: 8px 15px; font-size: 14px; }
        #last-result { display: none; text-align: center; border: 1px dashed #111; padding: 15px; margin-bottom: 30px; background-color: rgba(0,0,0,0.03); width: 100%; max-width: 350px; }
        #last-result span { font-weight: bold; font-size: 20px; }
        #scoreboard-container { width: 100%; max-width: 450px; border-top: 2px solid #111; padding-top: 20px; }
        #scoreboard-container h3 { margin-top: 0; text-align: left; font-size: 14px; letter-spacing: 1px; }
        .score-table { width: 100%; border-collapse: collapse; font-size: 14px; }
        .score-table th, .score-table td { padding: 8px 0; text-align: left; border-bottom: 1px solid #ddd; }
        .score-table th { font-weight: normal; color: #555; }
        #game-screen { display: none; }
        .shake { animation: shake-animation 0.2s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake-animation { 0%, 100% { transform: translate3d(0, 0, 0); } 20%, 60% { transform: translate3d(-10px, 0px, 0); } 40%, 80% { transform: translate3d(10px, 0px, 0); } }
        .star-particle { position: absolute; font-size: 18px; color: #111; pointer-events: none; animation: explode 0.4s ease-out forwards; }
        @keyframes explode { 0% { transform: scale(0.5) rotate(0deg); opacity: 1; } 100% { transform: scale(2) rotate(90deg) translate(0, -20px); opacity: 0; } }
        #ui { padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; font-size: 16px; border-bottom: 1px solid #111; }
        .hp-container { display: flex; align-items: center; gap: 10px; }
        #hp-bar-bg { width: 150px; height: 10px; background-color: transparent; border: 1px solid #111; }
        #hp-bar { width: 100%; height: 100%; background-color: #111; transition: width 0.2s; }
        #game-board { position: relative; flex-grow: 1; width: 100vw; }
        .enemy { position: absolute; font-size: 24px; font-weight: bold; color: #111; white-space: nowrap; letter-spacing: 1px; }
        .typed { color: #e8e4db; background-color: #111; padding: 0 2px; }
    </style>
</head>
<body>

    <audio id="bgm-audio" loop><source src="bgm.mp3" type="audio/mpeg"></audio>
    <audio id="hover-sfx"><source src="hover.mp3" type="audio/mpeg"></audio>
    <audio id="type-sfx"><source src="type.mp3" type="audio/mpeg"></audio>

    <div id="video-container">
        <video id="bg-video" autoplay loop muted playsinline>
            <source src="background.mp4" type="video/mp4">
        </video>
    </div>

    <div id="start-menu" class="screen">
        <button id="bgm-btn" class="btn" onclick="toggleBGM()">BGM: OFF</button>
        <h1>STARBOY OUTFIT</h1>
        <div class="subtitle">silent but unforgettable.</div>
        
        <div id="last-result">
            <div>LAST MATCH REPORT</div><br>
            SPEED: <span id="last-wpm">0</span> WPM<br>
            SCORE: <span id="last-score">0</span> PTS
        </div>

        <div class="setup-container">
            <input type="text" id="player-name" placeholder="ENTER YOUR NAME" maxlength="15" autocomplete="off">
            <div class="difficulty-btns">
                <button class="btn hover-sound" onclick="window.startGame('easy')">EASY</button>
                <button class="btn hover-sound" onclick="window.startGame('normal')">NORMAL</button>
                <button class="btn hover-sound" onclick="window.startGame('hard')">HARD</button>
            </div>
        </div>

        <div id="scoreboard-container">
            <h3>GLOBAL OUTFIT PRINCIPLES (TOP 5)</h3>
            <table class="score-table">
                <thead><tr><th>RANK</th><th>NAME</th><th>SCORE</th><th>WPM</th></tr></thead>
                <tbody id="leaderboard-rows">
                    <tr><td colspan="4" style="text-align: center; color: #777;">Loading Global Scores...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div id="ui">
            <div>SCORE: <span id="score" style="font-weight:bold;">0</span></div>
            <div>COMBO: <span id="combo">0</span> (x<span id="multiplier">1</span>)</div>
            <div>WPM: <span id="wpm">0</span></div>
            <div class="hp-container">
                <span>ENERGY</span>
                <div id="hp-bar-bg"><div id="hp-bar"></div></div>
            </div>
            <div>TARGET: <span id="target-word" style="font-weight: bold;">-</span></div>
        </div>
        <div id="game-board"></div>
    </div>

    <script type="module">
        // นำเข้าเครื่องมือจาก Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // *** วาง firebaseConfig ของคุณตรงนี้ ***
        const firebaseConfig = {
             apiKey: "AIzaSyDmm0C5VhCfpoiLHI9C731LhSaoqbuyeP0",
            authDomain: "rocket-rampage.firebaseapp.com",
            projectId: "rocket-rampage",
            storageBucket: "rocket-rampage.firebasestorage.app",
            messagingSenderId: "446728712883",
            appId: "1:446728712883:web:4b45d7771a2a6a91e876c6"
        };

        // เริ่มต้นระบบฐานข้อมูล
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ตัวแปรระบบเกม
        const startMenu = document.getElementById('start-menu');
        const gameScreen = document.getElementById('game-screen');
        const board = document.getElementById('game-board');
        const scoreEl = document.getElementById('score');
        const wpmEl = document.getElementById('wpm');
        const hpBar = document.getElementById('hp-bar');
        const targetWordEl = document.getElementById('target-word');
        const comboEl = document.getElementById('combo');
        const multiplierEl = document.getElementById('multiplier');
        const leaderboardRows = document.getElementById('leaderboard-rows');
        const playerNameInput = document.getElementById('player-name');
        const lastResultDiv = document.getElementById('last-result');
        const lastWpmEl = document.getElementById('last-wpm');
        const lastScoreEl = document.getElementById('last-score');
        const videoContainer = document.getElementById('video-container');
        
        let score = 0; let typedChars = 0; let startTime = null; let enemies = [];
        let currentTarget = null; let isGameOver = true; let spawnInterval = null;
        let animationFrameId = null; let currentWpm = 0; let hp = 100; const maxHp = 100; 
        let combo = 0; let currentMultiplier = 1; let isBgmPlaying = false; let currentPlayerName = "ANONYMOUS";
        let gameSettings = { speedMultiplier: 1, spawnRate: 2000, useMixedCase: false };
        const words = ["starboy", "outfit", "black", "confidence", "details", "night", "veloura", "archive", "fashion", "leather", "jacket", "style", "silent", "energy"];

        // โหลดกระดานคะแนนจากออนไลน์ทันที
        updateLeaderboardUI();

        // Parallax Effect
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 30;
            const y = (e.clientY / window.innerHeight - 0.5) * 30;
            videoContainer.style.transform = `translate(${x}px, ${y}px)`;
        });

        // ทำให้ฟังก์ชันผูกกับ HTML ได้ (เพราะเราใช้ type="module")
        window.toggleBGM = function() {
            const bgmAudio = document.getElementById('bgm-audio');
            const bgmBtn = document.getElementById('bgm-btn');
            if (isBgmPlaying) {
                bgmAudio.pause(); bgmBtn.innerText = "BGM: OFF";
            } else {
                bgmAudio.play().catch(e => console.log("รอผู้ใช้ตอบสนองก่อนเล่นเสียง"));
                bgmBtn.innerText = "BGM: ON";
            }
            isBgmPlaying = !isBgmPlaying;
        }

        window.startGame = function(difficulty) {
            if (playerNameInput.value.trim() === "") {
                alert("กรุณากรอกชื่อก่อนเริ่มเกมครับ");
                playerNameInput.focus(); return;
            }
            currentPlayerName = playerNameInput.value.trim().toUpperCase();

            if (difficulty === 'easy') gameSettings = { speedMultiplier: 0.8, spawnRate: 2500, useMixedCase: false };
            else if (difficulty === 'normal') gameSettings = { speedMultiplier: 1.3, spawnRate: 1800, useMixedCase: true };
            else if (difficulty === 'hard') gameSettings = { speedMultiplier: 2.0, spawnRate: 1000, useMixedCase: true };

            startMenu.style.display = 'none'; gameScreen.style.display = 'flex';
            lastResultDiv.style.display = 'none';

            score = 0; typedChars = 0; currentWpm = 0; combo = 0; currentMultiplier = 1; hp = maxHp;
            enemies = []; currentTarget = null; isGameOver = false; startTime = Date.now();

            updateUI(); updateHpUI(); targetWordEl.innerText = "-"; board.innerHTML = "";

            spawnInterval = setInterval(spawnEnemy, gameSettings.spawnRate);
            animationFrameId = requestAnimationFrame(updateGame);
        }

        function spawnEnemy() {
            if (isGameOver) return;
            let rawWord = words[Math.floor(Math.random() * words.length)];
            let displayWord = rawWord;
            if (gameSettings.useMixedCase) displayWord = rawWord.split('').map(char => Math.random() > 0.5 ? char.toUpperCase() : char.toLowerCase()).join('');

            const el = document.createElement('div');
            el.className = 'enemy'; el.innerText = displayWord;
            el.style.left = Math.random() * (window.innerWidth - 150) + 'px'; el.style.top = '0px';
            board.appendChild(el);
            enemies.push({ text: displayWord, el: el, y: 0, typed: "" });
        }

        function updateGame() {
            if (isGameOver) return;
            for (let i = enemies.length - 1; i >= 0; i--) {
                let enemy = enemies[i];
                enemy.y += 1.0 * gameSettings.speedMultiplier; enemy.el.style.top = enemy.y + 'px';

                if (enemy.y > board.clientHeight - 30) {
                    board.removeChild(enemy.el); enemies.splice(i, 1);
                    if (currentTarget === enemy) { currentTarget = null; targetWordEl.innerText = "-"; }
                    hp -= 20; if (hp < 0) hp = 0;
                    resetCombo(); updateHpUI();
                    if (hp <= 0) { gameOver(); return; }
                }
            }
            if (!isGameOver) animationFrameId = requestAnimationFrame(updateGame);
        }

        function resetCombo() { combo = 0; currentMultiplier = 1; updateUI(); }

        function triggerShake() {
            gameScreen.classList.remove('shake');
            void gameScreen.offsetWidth; 
            gameScreen.classList.add('shake');
        }

        function createStarExplosion(x, y) {
            const star = document.createElement('div');
            star.className = 'star-particle'; star.innerText = '✦';
            star.style.left = (x + (Math.random() * 20 - 10)) + 'px';
            star.style.top = (y + (Math.random() * 20 - 10)) + 'px';
            document.body.appendChild(star);
            setTimeout(() => star.remove(), 400);
        }

        document.addEventListener('keydown', (e) => {
            if (isGameOver) return;
            const key = e.key;
            if (key.length !== 1 || !/[a-zA-Z]/.test(key)) return;

            if (!currentTarget) {
                if (!gameSettings.useMixedCase) currentTarget = enemies.find(en => en.text.toLowerCase().startsWith(key.toLowerCase()));
                else currentTarget = enemies.find(en => en.text.startsWith(key));
                if(currentTarget) targetWordEl.innerText = currentTarget.text;
            }

            if (currentTarget) {
                const nextCharIndex = currentTarget.typed.length;
                const targetChar = currentTarget.text[nextCharIndex];

                let isCorrect = false;
                if (!gameSettings.useMixedCase) isCorrect = targetChar.toLowerCase() === key.toLowerCase();
                else isCorrect = targetChar === key;
                
                if (isCorrect) {
                    currentTarget.typed += targetChar;
                    typedChars++; combo++;
                    currentMultiplier = 1 + Math.floor(combo / 10);
                    currentTarget.el.innerHTML = `<span class="typed">${currentTarget.typed}</span>${currentTarget.text.substring(currentTarget.typed.length)}`;

                    document.getElementById('type-sfx').currentTime = 0;
                    document.getElementById('type-sfx').play().catch(()=>{});

                    const rect = currentTarget.el.getBoundingClientRect();
                    createStarExplosion(rect.left + (currentTarget.typed.length * 12), rect.top);

                    if (currentTarget.typed === currentTarget.text) {
                        board.removeChild(currentTarget.el);
                        enemies = enemies.filter(en => en !== currentTarget);
                        currentTarget = null; targetWordEl.innerText = "-";
                        
                        score += (10 * currentMultiplier);
                        hp = Math.min(maxHp, hp + 5);
                        updateHpUI();
                    }
                } else { triggerShake(); resetCombo(); }
                updateUI();
            } else { triggerShake(); resetCombo(); }

            const minutes = (Date.now() - startTime) / 60000;
            if (minutes > 0) currentWpm = Math.round((typedChars / 5) / minutes);
            updateUI();
        });

        function updateUI() {
            scoreEl.innerText = score; wpmEl.innerText = currentWpm;
            comboEl.innerText = combo; multiplierEl.innerText = currentMultiplier;
        }

        function updateHpUI() { hpBar.style.width = hp + '%'; }

        async function gameOver() {
            isGameOver = true; clearInterval(spawnInterval); cancelAnimationFrame(animationFrameId);
            gameScreen.classList.remove('shake'); 
            
            lastWpmEl.innerText = currentWpm; lastScoreEl.innerText = score;
            lastResultDiv.style.display = 'block';
            gameScreen.style.display = 'none'; startMenu.style.display = 'flex';

            // บันทึกและอัปเดตคะแนนออนไลน์
            await saveScore(currentPlayerName, score, currentWpm);
            await updateLeaderboardUI();
        }

        // --- ระบบส่งข้อมูลไป Firebase ---
        async function saveScore(name, newScore, newWpm) {
            try {
                // เพิ่มเอกสารใหม่ในคอลเลกชันชื่อ 'starboyScores'
                await addDoc(collection(db, "starboyScores"), {
                    name: name,
                    score: newScore,
                    wpm: newWpm,
                    timestamp: Date.now()
                });
            } catch (e) {
                console.error("Error adding document: ", e);
            }
        }

        // --- ระบบดึงข้อมูลจาก Firebase ---
        async function updateLeaderboardUI() {
            try {
                // ดึงข้อมูลโดยเรียงลำดับจากคะแนนมากไปน้อย และจำกัดแค่ 5 อันดับ
                const q = query(collection(db, "starboyScores"), orderBy("score", "desc"), limit(5));
                const querySnapshot = await getDocs(q);
                
                leaderboardRows.innerHTML = '';
                
                if (querySnapshot.empty) {
                    leaderboardRows.innerHTML = `<tr><td colspan="4" style="color:#777; text-align:center;">NO DATA YET</td></tr>`;
                    return;
                }

                let rank = 1;
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    leaderboardRows.innerHTML += `<tr><td>#${rank}</td><td>${data.name}</td><td style="font-weight:bold;">${data.score}</td><td>${data.wpm}</td></tr>`;
                    rank++;
                });
            } catch (e) {
                console.error("Error fetching documents: ", e);
                leaderboardRows.innerHTML = `<tr><td colspan="4" style="color:#f00; text-align:center;">Failed to load scores</td></tr>`;
            }
        }
    </script>
</body>
</html>
